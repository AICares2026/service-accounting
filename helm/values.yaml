service:
  name: service-accounting
image:
  repository: 952893849914.dkr.ecr.us-east-1.amazonaws.com/aicares-application/accounting
containerPort: 8080
resources:
  limits:
    memory: "300Mi"
  requests:
    memory: "64Mi"
    cpu: "50m"
env:
  - name: KAFKA_ADDR
    value: "kafka:9092"
  - name: OTEL_SERVICE_NAME
    value: "accounting"
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://otel-collector:4317"
nodeSelector:
  eks.amazonaws.com/nodegroup: graviton-workers
